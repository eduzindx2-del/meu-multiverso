<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiverso</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
display:flex;
}

/* SIDEBAR (igual ao seu) */
.sidebar{
width:80px;
height:100vh;
background:#000;
border-right:1px solid #222;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:30px;
position:fixed;
left:0;
top:0;
}

.icon{
width:40px;
height:40px;
background:#111;
border:1px solid #222;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.2s;
}

.icon:hover{
background:#222;
}

/* MAIN */
.main{
margin-left:80px;
padding:20px;
width:100%;
}

h1{
margin-bottom:20px;
font-size:26px;
}

/* SEARCH (mais fiel ao visual app) */
input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #222;
background:#111;
color:white;
margin-bottom:15px;
outline:none;
}

input:focus{
border-color:#555;
}

/* GRID IGUAL */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

/* CARD IGUALZINHO */
.card{
background:#111;
border:1px solid #222;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
border-color:white;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
display:block;
}

.card h3{
margin:10px;
font-size:14px;
font-weight:normal;
}

/* RESPONSIVO (mantém estilo original mas funciona melhor) */
@media (max-width: 768px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

@media (max-width: 480px){
.grid{
grid-template-columns:repeat(1,1fr);
}
}
</style>

</head>

<body>

<div class="sidebar">
<div class="icon">🏠</div>
<div class="icon">🌌</div>
<div class="icon">👤</div>
<div class="icon">⚙️</div>
</div>

<div class="main">

<h1>Universes</h1>

<input placeholder="Pesquisar universos...">

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa">
<h3>Cosmos Alpha</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564">
<h3>Nebula Core</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506318137071-a8e063b4bae0">
<h3>Galaxy X</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1534796636912-3b95b3ab5986">
<h3>Void Reach</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1543722530-d2c34013512b">
<h3>Stellar Drift</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa">
<h3>Pulsar Gate</h3>
</div>

</div>

</div>

</body>
</html>
