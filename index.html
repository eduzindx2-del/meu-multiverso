<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#090909;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 24px;
background:rgba(10,10,10,0.8);
backdrop-filter:blur(14px);
border-bottom:1px solid #1f1f1f;
z-index:100;
}

.logo{
font-size:22px;
font-weight:700;
letter-spacing:0.5px;
}

.header-buttons{
display:flex;
gap:10px;
}

.header-btn{
width:42px;
height:42px;
border:none;
border-radius:14px;
background:#151515;
color:white;
cursor:pointer;
transition:0.25s;
font-size:16px;
}

.header-btn:hover{
background:#242424;
transform:translateY(-2px);
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-280px;
width:260px;
height:100vh;
background:#101010;
border-right:1px solid #1f1f1f;
padding:90px 20px 20px;
transition:0.3s;
z-index:200;
}

.sidebar.active{
left:0;
}

.sidebar-top{
margin-bottom:30px;
}

.sidebar-top h2{
margin:0;
font-size:24px;
}

.sidebar-top p{
color:#777;
font-size:14px;
margin-top:5px;
}

.menu-btn{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:16px;
cursor:pointer;
transition:0.25s;
margin-bottom:10px;
background:#151515;
font-size:15px;
}

.menu-btn:hover{
background:#202020;
transform:translateX(4px);
}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(4px);
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:150;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* PAGE */

.page{
display:none;
padding-top:110px;
padding-left:24px;
padding-right:24px;
padding-bottom:40px;
min-height:100vh;
}

.page.active{
display:block;
}

/* HERO */

.hero{
max-width:1100px;
margin:auto;
background:linear-gradient(
145deg,
#111,
#0d0d0d
);
border:1px solid #1f1f1f;
border-radius:32px;
padding:50px;
box-shadow:
0 0 30px rgba(0,0,0,0.5);
}

.hero h1{
font-size:52px;
margin:0 0 16px;
line-height:1.1;
max-width:700px;
}

.hero p{
font-size:18px;
color:#888;
max-width:600px;
line-height:1.6;
margin-bottom:30px;
}

/* SEARCH */

.search-box{
display:flex;
gap:12px;
}

.search-box input{
flex:1;
padding:16px;
border:none;
border-radius:18px;
background:#151515;
color:white;
font-size:15px;
outline:none;
border:1px solid #222;
}

.search-box input:focus{
border-color:#555;
}

/* QUICK GRID */

.quick-grid{
max-width:1100px;
margin:24px auto 0;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.quick-card{
background:#111;
border:1px solid #1f1f1f;
border-radius:26px;
padding:28px;
transition:0.25s;
cursor:pointer;
}

.quick-card:hover{
transform:translateY(-4px);
border-color:#333;
background:#151515;
}

.quick-card h3{
margin:0 0 12px;
font-size:20px;
}

.quick-card p{
margin:0;
color:#777;
line-height:1.5;
}

/* SECTION */

.section{
max-width:1100px;
margin:auto;
}

.section h1{
font-size:42px;
margin-bottom:20px;
}

/* EMPTY BOX */

.empty-box{
background:#111;
border:1px solid #1f1f1f;
border-radius:28px;
padding:50px;
color:#777;
font-size:18px;
}

/* SETTINGS */

.settings-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.setting-card{
background:#111;
border:1px solid #1f1f1f;
border-radius:24px;
padding:30px;
transition:0.25s;
cursor:pointer;
font-size:18px;
}

.setting-card:hover{
background:#151515;
transform:translateY(-3px);
}

/* RESPONSIVO */

@media(max-width:900px){

.hero h1{
font-size:40px;
}

.quick-grid{
grid-template-columns:1fr;
}

.settings-grid{
grid-template-columns:1fr;
}

}

@media(max-width:600px){

.hero{
padding:30px;
}

.hero h1{
font-size:32px;
}

.hero p{
font-size:16px;
}

.page{
padding-left:16px;
padding-right:16px;
}

}

</style>
