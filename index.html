<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solk IA</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* HEADER */
header{
padding:20px;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.sub{
font-size:12px;
color:#777;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

/* CARD */
.card{
background:#111;
border:1px solid #222;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
border-color:#fff;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:14px;
font-weight:normal;
}

/* RESPONSIVO */
@media (max-width: 768px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

@media (max-width: 480px){
.grid{
grid-template-columns:repeat(1,1fr);
}
}
</style>

</head>

<body>

<header>
<div class="logo">🤖 Solk IA</div>
<div class="sub">Explorador de Universos</div>
</header>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa">
<h3>Cosmos Alpha</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564">
<h3>Nebula Core</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506318137071-a8e063b4bae0">
<h3>Galaxy X</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1534796636912-3b95b3ab5986">
<h3>Void Reach</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1543722530-d2c34013512b">
<h3>Stellar Drift</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa">
<h3>Pulsar Gate</h3>
</div>

</div>

</body>
</html>
