<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solk IA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #222;
background:#111;
position:sticky;
top:0;
z-index:20;
}

.logo{
font-size:24px;
font-weight:bold;
}

.header-buttons{
display:flex;
gap:10px;
}

.header-btn{
width:40px;
height:40px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:white;
cursor:pointer;
transition:0.2s;
}

.header-btn:hover{
background:#333;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-280px;
width:250px;
height:100vh;
background:#111;
border-right:1px solid #222;
padding:20px;
transition:0.3s;
z-index:100;
}

.sidebar.active{
left:0;
}

.sidebar h2{
margin-top:0;
}

.menu-btn{
display:flex;
align-items:center;
gap:10px;
padding:12px;
margin-bottom:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
background:#1a1a1a;
}

.menu-btn:hover{
background:#2a2a2a;
}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
z-index:50;
}

.overlay.active{
display:block;
}

/* MAIN */

.main{
padding:20px;
}

/* SEARCH */

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #222;
background:#111;
color:white;
outline:none;
}

/* CATEGORIES */

.categories{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:20px;
}

.categories button{
padding:8px 14px;
border:none;
border-radius:20px;
background:#1a1a1a;
color:#ccc;
cursor:pointer;
white-space:nowrap;
transition:0.2s;
}

.categories button:hover{
background:#333;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

/* CARD */

.card{
background:#111;
border:1px solid #222;
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:scale(1.03);
border-color:#666;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
}

.favorite{
cursor:pointer;
font-size:18px;
}

/* PAGES */

.page{
display:none;
}

.page.active{
display:block;
}

/* RESPONSIVO */

@media(max-width:768px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:480px){

.grid{
grid-template-columns:repeat(1,1fr);
}

}

</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>Menu</h2>

<div class="menu-btn" onclick="showPage('home')">
🏠 Página Inicial
</div>

<div class="menu-btn" onclick="showPage('settings')">
⚙️ Configuração
</div>

<div class="menu-btn" onclick="showPage('chat')">
💬 Conversa com Bots
</div>

<div class="menu-btn" onclick="showPage('bots')">
🤖 Bots Criados
</div>

</div>

<!-- HEADER -->

<header>

<div class="logo">🤖 Solk IA</div>

<div class="header-buttons">
<button class="header-btn">🔍</button>
<button class="header-btn" onclick="openSidebar()">☰</button>
</div>

</header>

<!-- HOME -->

<div class="main page active" id="home">

<div class="search">
<input
type="text"
placeholder="Pesquisar universos..."
id="searchInput"
onkeyup="searchUniverses()"
>
</div>

<div class="categories">
<button>Romance</button>
<button>Animes</button>
<button>Ficção</button>
<button>Fantasia</button>
<button>Amizades</button>
</div>

<div class="grid">

<div class="card" data-name="Cosmos Alpha">
<img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=500">
<div class="card-content">
<h3>Cosmos Alpha</h3>
<div class="favorite">⭐</div>
</div>
</div>

<div class="card" data-name="Nebula Core">
<img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=500">
<div class="card-content">
<h3>Nebula Core</h3>
<div class="favorite">⭐</div>
</div>
</div>

<div class="card" data-name="Galaxy X">
<img src="https://images.unsplash.com/photo-1506318137071-a8e063b4bae0?q=80&w=500">
<div class="card-content">
<h3>Galaxy X</h3>
<div class="favorite">⭐</div>
</div>
</div>

</div>

</div>

<!-- SETTINGS -->

<div class="main page" id="settings">
<h1>⚙️ Configuração</h1>
<p>Área de configurações do Solk IA.</p>
</div>

<!-- CHAT -->

<div class="main page" id="chat">
<h1>💬 Conversa com Bots</h1>
<p>Converse com seus bots futuramente.</p>
</div>

<!-- BOTS -->

<div class="main page" id="bots">
<h1>🤖 Bots Criados</h1>
<p>Nenhum bot criado ainda.</p>
</div>

<script>

function openSidebar(){
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(page).classList.add("active");

closeSidebar();

}

function searchUniverses(){

let input = document.getElementById("searchInput").value.toLowerCase();

let cards = document.querySelectorAll(".card");

cards.forEach(card=>{

let name = card.getAttribute("data-name").toLowerCase();

if(name.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
